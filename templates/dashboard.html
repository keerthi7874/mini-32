<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #0a0a0f;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        .navbar {
            display:flex;
            justify-content:space-between;
            padding:15px;
            background:#111;
        }

        .navbar a {
            color:white;
            margin:10px;
            text-decoration:none;
        }

        .container {
            padding: 30px;
            text-align: center;
        }

        .cards {
            display:flex;
            justify-content:center;
            gap:20px;
            margin-bottom:30px;
        }

        .card {
            background:#1a1a26;
            padding:20px;
            border-radius:10px;
            width:150px;
        }

        canvas {
            max-width:400px;
            margin:auto;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>🛡️ PhishGuard</div>

    <div>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/usecase">Usecase</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/history">History</a>
        <a href="/help">Help</a>
    </div>

    <a href="/download_report" style="background:green;padding:5px 10px;">Download</a>
</div>

<!-- CONTENT -->
<div class="container">

    <h1>📊 Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h3>Total</h3>
            <p>{{ total }}</p>
        </div>

        <div class="card">
            <h3>Phishing</h3>
            <p>{{ phishing }}</p>
        </div>

        <div class="card">
            <h3>Safe</h3>
            <p>{{ safe }}</p>
        </div>
    </div>

    <!-- CHART -->
    <canvas id="chart"></canvas>

</div>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'pie',
    data: {
        labels: ['Safe', 'Phishing'],
        datasets: [{
            data: [{{ safe }}, {{ phishing }}]
        }]
    }
});
</script>

</body>
</html>
